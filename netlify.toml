[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

[functions."catbox-proxy"]
  timeout = 26

[functions."publish"]
  timeout = 26

[functions."sanitize-media"]
  timeout = 26

[functions."publish-finish"]
  timeout = 26

[functions."filegarden-proxy"]
  timeout = 26

[functions.health-check]
  schedule = "0 7 * * *"

[functions."add-account-via-token"]
  timeout = 20
